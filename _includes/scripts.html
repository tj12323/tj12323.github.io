<script src="assets/js/main.min.js"></script>
<script>
  (function() {
    function isExternalHttpLink(link) {
      var href = link.getAttribute("href");
      var url;

      if (!href || href.charAt(0) === "#") return false;
      if (/^(mailto:|tel:|javascript:)/i.test(href)) return false;

      try {
        url = new URL(href, window.location.href);
      } catch (e) {
        return false;
      }

      if (url.protocol !== "http:" && url.protocol !== "https:") return false;
      return url.host !== window.location.host;
    }

    function ensureExternalLinksOpenInNewTab() {
      var links = document.querySelectorAll("a[href]");
      links.forEach(function(link) {
        var relTokens;
        if (!isExternalHttpLink(link)) return;

        link.setAttribute("target", "_blank");

        relTokens = (link.getAttribute("rel") || "")
          .split(/\s+/)
          .filter(Boolean);

        if (relTokens.indexOf("noopener") === -1) relTokens.push("noopener");
        if (relTokens.indexOf("noreferrer") === -1) relTokens.push("noreferrer");

        link.setAttribute("rel", relTokens.join(" "));
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", ensureExternalLinksOpenInNewTab);
    } else {
      ensureExternalLinksOpenInNewTab();
    }

    // Scroll Reveals
    var revealElements = document.querySelectorAll('.paper-box, .timeline-item, .news-box li, .awards-group li');
    if (revealElements.length > 0) {
      var observerOptions = {
        root: null,
        rootMargin: '0px 0px -40px 0px',
        threshold: 0.1
      };

      var observer = new IntersectionObserver(function(entries, observer) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-revealed');
            observer.unobserve(entry.target);
          }
        });
      }, observerOptions);

      revealElements.forEach(function(el, index) {
        el.classList.add('will-reveal');
        // Adding a slight staggered delay based on DOM order for elements close to each other
        el.style.transitionDelay = (index % 6) * 0.06 + 's';
        observer.observe(el);
      });
    }
  })();
</script>
